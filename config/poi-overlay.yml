schema_name: POI overlay (low-zoom)
schema_description: >
  Points of interest (schools, hospitals, shops, offices, etc.) visible starting
  well below OpenMapTiles' built-in poi layer, which gates most categories to z14.
attribution: <a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>

args:
  area:
    description: Geofabrik area to download
    default: madagascar

sources:
  osm:
    type: osm
    url: '${ "geofabrik:" + args.area }'

layers:
  - id: poi
    features:
      - source: osm
        geometry: point
        min_zoom: 12
        include_when:
          amenity:
            - hospital
            - clinic
            - doctors
            - dentist
            - pharmacy
            - veterinary
            - school
            - college
            - university
            - library
            - police
            - fire_station
            - townhall
            - courthouse
            - post_office
            - embassy
            - community_centre
            - bank
            - atm
            - restaurant
            - cafe
            - bar
            - pub
            - fast_food
            - food_court
            - biergarten
            - marketplace
            - place_of_worship
            - cinema
            - theatre
            - arts_centre
            - fuel
            - parking
            - bus_station
            - ferry_terminal
            - nursing_home
            - prison
          shop:
            - supermarket
            - convenience
            - department_store
            - mall
            - bakery
            - butcher
            - greengrocer
            - alcohol
            - beverages
            - chemist
            - clothes
            - shoes
            - jewelry
            - books
            - stationery
            - computer
            - mobile_phone
            - electronics
            - hardware
            - doityourself
            - furniture
            - garden_centre
            - car
            - bicycle
            - hairdresser
            - beauty
            - laundry
            - optician
            - travel_agency
            - kiosk
          healthcare:
            - hospital
            - clinic
            - pharmacy
            - dentist
            - doctor
          office:
            - government
            - diplomatic
            - association
            - ngo
            - insurance
            - lawyer
            - estate_agent
          tourism:
            - hotel
            - motel
            - hostel
            - guest_house
            - bed_and_breakfast
            - museum
            - gallery
            - information
            - zoo
            - theme_park
            - attraction
          leisure:
            - park
            - garden
            - pitch
            - sports_centre
            - stadium
            - swimming_pool
            - golf_course
            - playground
          railway:
            - station
            - halt
        attributes:
          # Planetiler's match_key/match_value are named from the OSM tag's
          # own perspective, not OpenMapTiles' schema convention: match_key
          # is the broad tag KEY that satisfied include_when (amenity, shop,
          # healthcare, office, tourism, leisure, railway -- 7 values), and
          # match_value is that key's specific VALUE (hospital, restaurant,
          # supermarket, ...). Consumers (e.g. adiresy-mobile's StyleLoader,
          # which matches specific categories like "hospital"/"restaurant")
          # expect OpenMapTiles-style class/subclass instead, where class is
          # the specific category -- so class here takes match_value and
          # subclass takes match_key, the reverse of what the names suggest.
          - key: class
            type: match_value
          - key: subclass
            type: match_key
          - key: name
            tag_value: name
          - key: name_fr
            tag_value: name:fr
